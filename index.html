<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>野球スコアボード - ログイン</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #1a3a1a;
      background-image:
        radial-gradient(ellipse at center, #2d5a27 0%, #1a3a1a 60%, #0d1f0d 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
      padding: 24px 16px;
    }

    /* 外野フェンス */
    .field-lines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .field-lines::before {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 200vw;
      height: 200vw;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.07);
    }

    .field-lines::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 150vw;
      height: 150vw;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.05);
    }

    /* ベースパス（ダイヤモンド） */
    .diamond {
      position: fixed;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 300px;
      height: 300px;
      border: 2px solid rgba(255,255,255,0.1);
      pointer-events: none;
    }

    /* スタジアムライト効果 */
    .stadium-light {
      position: fixed;
      width: 300px;
      height: 600px;
      background: radial-gradient(ellipse at top, rgba(255,250,200,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .stadium-light.left { top: -100px; left: 5%; transform: rotate(-20deg); }
    .stadium-light.right { top: -100px; right: 5%; transform: rotate(20deg); }

    /* メインカード */
    .login-card {
      background: rgba(15, 30, 15, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 24px 40px 32px;
      margin-top: 0;
      width: 100%;
      max-width: 420px;
      position: relative;
      box-shadow:
        0 0 60px rgba(0,0,0,0.6),
        0 0 0 1px rgba(255,255,255,0.05) inset;
    }

    /* 野球ボールアイコン */
    .ball-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 14px;
      position: relative;
    }

    .ball-icon svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 4px 12px rgba(220,50,50,0.4));
    }

    /* タイトル */
    .title {
      text-align: center;
      margin-bottom: 18px;
    }

    .title h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 0.05em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .title p {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
      margin-top: 6px;
      letter-spacing: 0.08em;
    }

    /* フォーム */
    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.3);
      font-size: 1rem;
      pointer-events: none;
    }

    .form-group input {
      width: 100%;
      padding: 13px 16px 13px 42px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #ffffff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .form-group input::placeholder {
      color: rgba(255,255,255,0.2);
    }

    .form-group input:focus {
      border-color: rgba(180,220,80,0.6);
      background: rgba(255,255,255,0.09);
      box-shadow: 0 0 0 3px rgba(180,220,80,0.1);
    }

    /* オプション行 */
    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      font-size: 0.82rem;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
    }

    .remember input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: #a8d840;
      cursor: pointer;
    }

    .forgot-link {
      color: rgba(180,220,80,0.8);
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot-link:hover {
      color: #a8d840;
    }

    /* ログインボタン */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #5a9e20, #3d7a10);
      border: none;
      border-radius: 8px;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(90,158,32,0.35);
    }

    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(90,158,32,0.5);
    }

    .btn-login:hover::before {
      opacity: 1;
    }

    .btn-login:active {
      transform: translateY(0);
    }

    /* 区切り線 */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      color: rgba(255,255,255,0.2);
      font-size: 0.78rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    /* 登録リンク */
    .signup-link {
      text-align: center;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
    }

    .signup-link a {
      color: rgba(180,220,80,0.9);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .signup-link a:hover {
      color: #a8d840;
    }

    /* スコアボード風装飾 */
    .scoreboard-badge {
      display: block;
      width: fit-content;
      margin: 0 auto 14px;
      background: linear-gradient(135deg, #c8a020, #a07810);
      color: #1a1a00;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      padding: 4px 16px;
      border-radius: 20px;
      text-transform: uppercase;
      box-shadow: 0 2px 8px rgba(200,160,32,0.4);
    }

    /* フライングボール装飾 */
    @keyframes floatBall {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(180deg); }
    }

    .deco-ball {
      position: fixed;
      width: 28px;
      height: 28px;
      opacity: 0.12;
      animation: floatBall 6s ease-in-out infinite;
      pointer-events: none;
    }

    .deco-ball:nth-child(1) { top: 15%; left: 8%; animation-delay: 0s; }
    .deco-ball:nth-child(2) { top: 25%; right: 10%; animation-delay: 2s; }
    .deco-ball:nth-child(3) { bottom: 20%; left: 12%; animation-delay: 4s; }
    .deco-ball:nth-child(4) { bottom: 30%; right: 7%; animation-delay: 1s; }
  </style>
</head>
<body>

  <!-- 背景装飾 -->
  <div class="field-lines"></div>
  <div class="diamond"></div>
  <div class="stadium-light left"></div>
  <div class="stadium-light right"></div>

  <!-- 浮遊する野球ボール -->
  <svg class="deco-ball" viewBox="0 0 40 40" fill="white"><circle cx="20" cy="20" r="18" fill="white"/><path d="M8 14 Q14 12 16 20 Q14 28 8 26" stroke="#cc3333" stroke-width="2" fill="none"/><path d="M32 14 Q26 12 24 20 Q26 28 32 26" stroke="#cc3333" stroke-width="2" fill="none"/></svg>
  <svg class="deco-ball" viewBox="0 0 40 40" fill="white"><circle cx="20" cy="20" r="18" fill="white"/><path d="M8 14 Q14 12 16 20 Q14 28 8 26" stroke="#cc3333" stroke-width="2" fill="none"/><path d="M32 14 Q26 12 24 20 Q26 28 32 26" stroke="#cc3333" stroke-width="2" fill="none"/></svg>
  <svg class="deco-ball" viewBox="0 0 40 40" fill="white"><circle cx="20" cy="20" r="18" fill="white"/><path d="M8 14 Q14 12 16 20 Q14 28 8 26" stroke="#cc3333" stroke-width="2" fill="none"/><path d="M32 14 Q26 12 24 20 Q26 28 32 26" stroke="#cc3333" stroke-width="2" fill="none"/></svg>
  <svg class="deco-ball" viewBox="0 0 40 40" fill="white"><circle cx="20" cy="20" r="18" fill="white"/><path d="M8 14 Q14 12 16 20 Q14 28 8 26" stroke="#cc3333" stroke-width="2" fill="none"/><path d="M32 14 Q26 12 24 20 Q26 28 32 26" stroke="#cc3333" stroke-width="2" fill="none"/></svg>

  <!-- ログインカード -->
  <div class="login-card">
    <span class="scoreboard-badge">⚾ Baseball Score</span>

    <!-- 野球ボール SVG -->
    <div class="ball-icon">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="46" fill="white" stroke="#ddd" stroke-width="1"/>
        <path d="M22 32 Q32 28 36 50 Q32 72 22 68" stroke="#cc2222" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path d="M25 35 L28 38 M25 41 L28 44 M25 47 L28 50 M25 53 L28 56 M25 59 L28 62 M25 65 L28 68" stroke="#cc2222" stroke-width="2" stroke-linecap="round"/>
        <path d="M78 32 Q68 28 64 50 Q68 72 78 68" stroke="#cc2222" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path d="M75 35 L72 38 M75 41 L72 44 M75 47 L72 50 M75 53 L72 56 M75 59 L72 62 M75 65 L72 68" stroke="#cc2222" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="title">
      <h1>スコアボード</h1>
      <p>BASEBALL SCORE TRACKER</p>
    </div>

    <form onsubmit="return false;">
      <div class="form-group">
        <label>ユーザーID</label>
        <div class="input-wrapper">
          <span class="icon">👤</span>
          <input type="text" placeholder="ユーザーIDを入力" autocomplete="username">
        </div>
      </div>

      <div class="form-group">
        <label>パスワード</label>
        <div class="input-wrapper">
          <span class="icon">🔒</span>
          <input type="password" placeholder="パスワードを入力" autocomplete="current-password">
        </div>
      </div>

      <div class="form-options">
        <label class="remember">
          <input type="checkbox"> ログイン状態を保持
        </label>
        <a href="#" class="forgot-link">パスワードを忘れた？</a>
      </div>

      <button type="submit" class="btn-login">⚾ プレイボール！</button>
    </form>

    <div class="divider">または</div>

    <div class="signup-link">
      アカウントをお持ちでない方は <a href="#">新規登録</a>
    </div>
  </div>

</body>
</html>
